<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>하루벼리</title><style>body{font-family:sans-serif;background:#f6eddd;padding:20px;color:#243038}textarea,input{width:100%;font-size:16px;margin:6px 0 14px;padding:10px}button,label{display:inline-block;margin:5px;padding:10px 12px;border:1px solid #b8945f;border-radius:20px;background:#fff8ed}.card{background:#fff8ed;border:1px solid #b8945f;border-radius:20px;padding:18px;max-width:560px;margin:auto}img{max-width:100%;border-radius:12px}</style></head><body><div class='card'><h1>하루벼리 v0.4</h1><p>비움 · 세움 · 엮음</p><input type='date' id='date'><textarea id='memo' rows='10' placeholder='오늘의 기록'></textarea><button onclick='save()'>저장</button><button onclick='exportBackup()'>전체 백업</button><label>백업 불러오기<input type='file' accept='application/json' onchange='importBackup(this)' style='display:none'></label><hr><input type='file' accept='image/*' onchange='addPhoto(this)'><div id='photos'></div></div><script>const KEY='hb_v04_simple';let date=document.getElementById('date');let memo=document.getElementById('memo');date.value=new Date().toISOString().slice(0,10);let data=JSON.parse(localStorage.getItem(KEY)||'{}');function cur(){return data[date.value]||(data[date.value]={memo:'',photos:[]})}function render(){memo.value=cur().memo||'';photos.innerHTML=(cur().photos||[]).map((p,i)=>`<div><img src="${p.data}"><textarea oninput="cur().photos[${i}].note=this.value;persist()" placeholder="사진 메모">${p.note||''}</textarea><button onclick="cur().photos.splice(${i},1);persist();render()">삭제</button></div>`).join('')}function persist(){localStorage.setItem(KEY,JSON.stringify(data))}function save(){cur().memo=memo.value;persist();alert('저장됨')}date.onchange=render;memo.oninput=()=>{cur().memo=memo.value;persist()};function addPhoto(input){let f=input.files[0];if(!f)return;if(cur().photos.length>=2){alert('사진은 날짜별 2장까지');return}let r=new FileReader();r.onload=()=>{cur().photos.push({data:r.result,note:''});persist();render()};r.readAsDataURL(f)}function exportBackup(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify({app:'하루벼리',version:'0.4-simple',data},null,2)],{type:'application/json'}));a.download='harubyeori-full-backup.json';a.click()}async function importBackup(input){let f=input.files[0];if(!f)return;let obj=JSON.parse(await f.text());if(obj.data)data={...data,...obj.data};persist();render()}render()</script></body></html>
